spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update  # 엔티티 기반 테이블 자동 생성

  datasource:
    url: jdbc:h2:mem:commeetdb
    username: sa
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never  # data.sql 없어도 오류 안 나도록

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope:
              - email
              - profile

jwt:
  issuer: commeet-inyro
  secret_key: ${JWT_SECRET_KEY}
