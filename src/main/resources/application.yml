spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
#    hibernate:
#      ddl-auto: update  # 엔티티 기반 테이블 자동 생성

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
#    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
#      path: /h2-console

  sql:
    init:
      mode: never  # data.sql 없어도 오류 안 나도록
#      mode: always

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: us-east-1
    s3:
      bucket: lostitemreporting-inyro-image
    stack:
      auto: false
